<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .neon-glow-primary {
      box-shadow: 0 0 40px rgba(208, 188, 255, 0.3);
    }
    .orbital-ring {
      border: 1px solid rgba(208, 188, 255, 0.1);
      border-radius: 50%;
      position: absolute;
    }
    .orbital-path {
      animation: rotate 10s linear infinite;
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .cosmic-pulse {
      animation: pulse 4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.05); }
    }
  </style>

                  "on-background": "#e1e1f0",

                  "surface": "#11131d",

                  "inverse-primary": "#6d3bd7",

<body class="bg-background text-on-background min-h-screen overflow-hidden flex flex-col font-body-md text-body-md">

<div class="hidden md:flex items-center gap-md text-on-surface-variant font-label-md">
<span class="hover:text-primary-fixed transition-colors duration-200 cursor-pointer">Galaxy</span>
<span class="hover:text-primary-fixed transition-colors duration-200 cursor-pointer">Safety</span>
<span class="hover:text-primary-fixed transition-colors duration-200 cursor-pointer">Orbits</span>
<span class="hover:text-primary-fixed transition-colors duration-200 cursor-pointer">Support</span>
</div>
<div class="flex items-center gap-sm">
<button class="material-symbols-outlined text-on-surface-variant p-2 hover:bg-white/5 rounded-full transition-all">notifications</button>
<button class="material-symbols-outlined text-on-surface-variant p-2 hover:bg-white/5 rounded-full transition-all">settings</button>
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center overflow-hidden border border-white/10">
<img class="w-full h-full object-cover" data-alt="A professional profile portrait of a modern young adult with soft cinematic lighting." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBDUMPbGyAqDd6i2FUXtPeVjNQm5frmB9VVmIkXCdbCecwcXW9setQy7p7BxrCFf_5XdMO1za_w9qsTfuhIR6Hyg-1fUctgRLOb3QRK5SYABc_kgPwLz7QbIjVDFAXjxjUyLmLDmbV4MeEFmTmN9KL7-GAcCIByp1m4KI497e_W-MPF-xTcmf5iTzHYmu0-mfWMjUag2sRuspPGZbv3FmJ75gXszpWP3u-MGgqBFn6IwXXkT0aUh4OqCYVwp75JLQaHvTdjSviBK-4"/>
</div>
</div>

<div class="absolute inset-0 cosmic-pulse bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-primary/10 via-transparent to-transparent"></div>
</div>
<!-- Cosmic Matchmaking UI -->
<div class="z-10 flex flex-col items-center justify-center gap-lg max-w-lg w-full px-base">
<!-- Orbital Scanning Animation -->
<div class="relative w-80 h-80 flex items-center justify-center">
<!-- Outer Orbit -->
<div class="orbital-ring orbital-path w-full h-full border-dashed border-primary/20">
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-2 h-2 rounded-full bg-primary shadow-[0_0_10px_#d0bcff]"></div>
</div>
<!-- Middle Orbit -->
<div class="orbital-ring orbital-path w-3/4 h-3/4 border-solid border-secondary/10" style="animation-direction: reverse; animation-duration: 7s;">
<div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-1.5 h-1.5 rounded-full bg-secondary shadow-[0_0_10px_#5de6ff]"></div>
</div>
<!-- Inner Glow -->
<div class="absolute inset-0 rounded-full bg-primary/5 blur-3xl scale-75"></div>
<!-- Center Profile Bubble -->
<div class="relative w-36 h-36 rounded-full border-2 border-primary-fixed/30 p-1 bg-surface-container-low/60 backdrop-blur-3xl shadow-[0_0_50px_rgba(208,188,255,0.2)]">
<div class="w-full h-full rounded-full overflow-hidden">
<img class="w-full h-full object-cover" data-alt="Profile image" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB6bmH8Cu4hwTCjRBs-eDxiat-PZMIpvGNwQlImSICTgtWNjhMzBgK1O-oCX-MZh98mbK7cPvX3F0F3hix6ld1PP9a-wXqM6otTKs5Bx6EwG4TVDhlpAJ6svIlnnhlk5p0AjYY-IdfHOkA3SGymllrnti9d6oPOm2GW_gUm2nEs4wJhLcvgKdffq6QoIS5DBrXmHm03_Xq6WQmkzh9FhwVCgtGK0euAoF0K6zqtQwpnDWJpZ4Qx4iWRIJD6l-poPPKZuBLV2dzGssw"/>
</div>
<!-- Scan Sweep Overlay -->
<div class="absolute inset-0 rounded-full bg-gradient-to-t from-primary/30 to-transparent animate-pulse"></div>
</div>
</div>
<!-- Status Text -->
<div class="text-center space-y-sm">
<h1 class="font-display-lg text-headline-lg md:text-display-lg text-primary tracking-tight">Finding Your Next Orbit...</h1>
<p class="font-body-lg text-on-surface-variant max-w-xs mx-auto">Scanning the celestial sphere for a stellar connection.</p>
</div>
<!-- Data Cards -->
<div class="grid grid-cols-2 gap-sm w-full">
<div class="glass-card p-sm rounded-xl flex flex-col items-center gap-1 border-primary/10">
<span class="text-on-surface-variant font-label-sm uppercase tracking-widest">GALAXY SIZE</span>
<span class="font-headline-md text-primary-fixed">14.2k</span>
<span class="text-on-surface-variant font-label-sm">SOULS ONLINE</span>
</div>
<div class="glass-card p-sm rounded-xl flex flex-col items-center gap-1 border-secondary/10">
<span class="text-on-surface-variant font-label-sm uppercase tracking-widest">SIGNAL</span>
<span class="font-headline-md text-secondary-fixed">24ms</span>
<span class="text-on-surface-variant font-label-sm">LIGHTSPEED</span>
</div>
</div>
<!-- Actions -->
<div class="flex flex-col gap-md w-full">
<button class="w-full py-4 bg-gradient-to-r from-primary-container to-secondary-container text-on-primary-fixed font-label-md rounded-full shadow-[0_0_30px_rgba(109,59,215,0.4)] hover:brightness-110 transition-all active:scale-95">
          Scanning Constellations...
        </button>
<button class="w-full py-4 glass-card text-on-surface font-label-md rounded-full hover:bg-white/5 transition-colors">
          Abort Mission
        </button>
</div>
</div>
</main>
<!-- Mobile Navigation -->
<nav class="md:hidden fixed bottom-0 w-full z-50 bg-surface-container-lowest/80 backdrop-blur-xl border-t border-white/5 flex justify-around items-center h-16 pb-safe">
<div class="flex flex-col items-center justify-center text-on-surface-variant/60">
<span class="material-symbols-outlined">public</span>
<span class="font-label-sm">Universe</span>
</div>
<div class="flex flex-col items-center justify-center text-primary-fixed drop-shadow-[0_0_8px_rgba(208,188,255,0.6)]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<span class="font-label-sm">Nova</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant/60">
<span class="material-symbols-outlined">forum</span>
<span class="font-label-sm">Signals</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant/60">
<span class="material-symbols-outlined">account_circle</span>
<span class="font-label-sm">Profile</span>
</div>
</nav>
<!-- Floating Orbital Decorations -->
<div class="absolute top-32 left-10 hidden xl:block animate-pulse" style="animation-duration: 6s;">
<div class="glass-card p-1 rounded-full w-24 h-24 overflow-hidden border-primary-fixed/20 border-2">
