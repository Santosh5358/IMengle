version: '3.9'

services:
  # ─── PostgreSQL Database ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: anonconnect-postgres
    environment:
      POSTGRES_DB: anonconnect
      POSTGRES_USER: anonconnect
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-anonconnect_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anonconnect"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - anonconnect-net

  # ─── Redis Cache/Queue ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: anonconnect-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - anonconnect-net

  # ─── Spring Boot Backend ────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: anonconnect-backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/anonconnect
      SPRING_DATASOURCE_USERNAME: anonconnect
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-anonconnect_secret}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      JWT_SECRET: ${JWT_SECRET:-c2VjdXJlLWp3dC1zZWNyZXQta2V5LWZvci1hbm9uY29ubmVjdC1wbGF0Zm9ybS0yMDI1}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - anonconnect-net

  # ─── Angular Frontend ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: anonconnect-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - anonconnect-net

  # ─── NGINX Reverse Proxy ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: anonconnect-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - anonconnect-net

  # ─── TURN Server (Coturn) ───────────────────────────────────
  coturn:
    image: coturn/coturn:latest
    container_name: anonconnect-coturn
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "5349:5349"
      - "5349:5349/udp"
      - "49152-49200:49152-49200/udp"
    volumes:
      - ./docker/turnserver.conf:/etc/coturn/turnserver.conf:ro
    networks:
      - anonconnect-net

volumes:
  postgres_data:
  redis_data:

networks:
  anonconnect-net:
    driver: bridge
