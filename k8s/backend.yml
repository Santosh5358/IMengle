apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: anonconnect
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: anonconnect/backend:latest
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9092
              name: socketio
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: anonconnect
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: socketio
      port: 9092
      targetPort: 9092
  type: ClusterIP
