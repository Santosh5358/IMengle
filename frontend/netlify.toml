[build]
  publish = "dist/anonconnect"
  command = "npm run build:prod"

[[redirects]]
  from = "/api"
  to = "https://imengle.onrender.com/api"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "https://imengle.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/socket.io*"
  to = "https://imengle.onrender.com/socket.io:splat"
  status = 200
  force = true

[[redirects]]
  from = "/socket.io/*"
  to = "https://imengle.onrender.com:9092/socket.io/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/socket.io"
  to = "https://imengle.onrender.com:9092/socket.io"
  status = 200
  force = true
