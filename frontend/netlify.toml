[build]
  publish = "dist/anonconnect/browser"
  command = "npm run build:prod"

[[redirects]]
  from = "/api/*"
  to = "https://imengle.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/socket.io/*"
  to = "https://imengle.onrender.com/socket.io/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
