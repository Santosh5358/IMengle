# ═══════════════════════════════════════════════════════════
# AnonConnect - DEV Profile (H2 + In-Memory, no Docker needed)
# ═══════════════════════════════════════════════════════════

spring:
  # ─── H2 In-Memory Database ───────────────────────────────
  datasource:
    url: jdbc:h2:mem:anonconnect;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  # ─── Disable Redis Auto-Config ───────────────────────────
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  data:
    redis:
      host: localhost
      port: 6379
      password: unused

# ─── Dev matchmaking uses in-memory queue ─────────────────
matchmaking:
  use-redis: false

logging:
  level:
    com.anonconnect: DEBUG
    org.springframework.web: DEBUG
