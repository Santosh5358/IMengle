# ═══════════════════════════════════════════════════════════
# AnonConnect - Application Configuration
# ═══════════════════════════════════════════════════════════

server:
  port: ${PORT:8080}

spring:
  application:
    name: anonconnect-backend

  # ─── MongoDB Configuration ──────────────────────────────
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/anonconnect}

  # ─── Disable JPA / DataSource / Redis Auto-Config ───────
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# ─── JWT Configuration ────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:c2VjdXJlLWp3dC1zZWNyZXQta2V5LWZvci1hbm9uY29ubmVjdC1wbGF0Zm9ybS0yMDI1}
  expiration-ms: 86400000  # 24 hours

# ─── Socket.IO Configuration ─────────────────────────────
socketio:
  host: 0.0.0.0
  port: ${SOCKETIO_PORT:9092}

# ─── WebRTC STUN/TURN ────────────────────────────────────
webrtc:
  stun-servers:
    - stun:stun.l.google.com:19302
    - stun:stun1.l.google.com:19302
  turn-server: turn:your-turn-server:3478
  turn-username: anonconnect
  turn-credential: turn_secret

# ─── Matchmaking ──────────────────────────────────────────
matchmaking:
  use-redis: false
  queue-key: matchmaking:queue
  timeout-seconds: 30
  max-queue-size: 10000

logging:
  level:
    com.anonconnect: ${LOG_LEVEL:INFO}

# ─── Actuator ─────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
