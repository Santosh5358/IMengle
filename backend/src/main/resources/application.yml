# ═══════════════════════════════════════════════════════════
# AnonConnect - Application Configuration
# ═══════════════════════════════════════════════════════════

server:
  port: ${SERVER_PORT:${PORT:8080}}

spring:
  application:
    name: anonconnect-backend

  main:
    web-application-type: ${WEB_APPLICATION_TYPE:servlet}

  # ─── MongoDB Configuration ──────────────────────────────
  data:
    mongodb:
      uri: ${MONGODB_URI}

  # ─── Disable JPA / DataSource / Redis Auto-Config ───────
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# ─── JWT Configuration ────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:c2VjdXJlLWp3dC1zZWNyZXQta2V5LWZvci1hbm9uY29ubmVjdC1wbGF0Zm9ybS0yMDI1}
  expiration-ms: 86400000  # 24 hours

# ─── Socket.IO Configuration ─────────────────────────────
socketio:
  enabled: ${SOCKETIO_ENABLED:false}
  host: ${SOCKETIO_HOST:0.0.0.0}
  port: ${SOCKETIO_PORT:${PORT:9092}}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,https://imengle.onrender.com,https://imengle.netlify.app,https://www.imengle.netlify.app}

# ─── WebRTC STUN/TURN ────────────────────────────────────
webrtc:
  stun-servers:
    - stun:stun.l.google.com:19302
    - stun:stun1.l.google.com:19302
  turn-server: turn:your-turn-server:3478
  turn-username: anonconnect
  turn-credential: turn_secret

# ─── Matchmaking ──────────────────────────────────────────
matchmaking:
  use-redis: false
  queue-key: matchmaking:queue
  timeout-seconds: 30
  max-queue-size: 10000

logging:
  level:
    com.anonconnect: ${LOG_LEVEL:INFO}

# ─── Actuator ─────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
